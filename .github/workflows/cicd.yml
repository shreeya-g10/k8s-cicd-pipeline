name: Kubernetes CI/CD

on:
  push:
    branches:
      - main

env:
  IMAGE: shreeya987/flask-k8s-app

jobs:

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - run: pip install -r requirements.txt

      - run: pytest


  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t shreeya987/flask-k8s-app:latest .

      - name: Push Image
        run: docker push shreeya987/flask-k8s-app:latest


  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v3

      - name: Setup kubeconfig
        run: echo "${{ secrets.KUBECONFIG }}" | base64 -d > kubeconfig

      - name: Deploy
        run: |
          kubectl set image deployment/flask-app flask=shreeya987/flask-k8s-app:latest --kubeconfig=kubeconfig
          kubectl rollout status deployment/flask-app --kubeconfig=kubeconfig
